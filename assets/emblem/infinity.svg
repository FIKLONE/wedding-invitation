<svg xmlns="http://www.w3.org/2000/svg"
     width="180"
     height="180"
     viewBox="0 0 180 180"
     fill="none">

    <!-- Outer Circle -->
    <circle
        cx="90"
        cy="90"
        r="72"
        stroke="#4A6785"
        stroke-width="2"
        opacity=".18"/>

    <!-- Left Infinity Loop -->
    <path
        d="
        M90 90
        C74 68 48 68 42 90
        C48 112 74 112 90 90
        "
        fill="#7FA1C5"/>

    <!-- Right Infinity Loop -->
    <path
        d="
        M90 90
        C106 68 132 68 138 90
        C132 112 106 112 90 90
        "
        fill="#7FA1C5"/>

    <!-- Wedding Ring Left -->
    <circle
        cx="78"
        cy="90"
        r="8"
        stroke="#C7A878"
        stroke-width="3"
        fill="none"/>

    <!-- Wedding Ring Right -->
    <circle
        cx="102"
        cy="90"
        r="8"
        stroke="#C7A878"
        stroke-width="3"
        fill="none"/>

</svg>